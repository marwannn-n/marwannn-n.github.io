<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>marwan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet" />

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: #0a0a0a url('./pbc.jpg') center center / cover no-repeat fixed;
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
    }

    /* ── Section 1: Photos ──────────────────────────────────── */
    #section-photos {
      position: relative;
      width: 100vw;
      min-height: 100svh;
      height: 100svh;
      overflow: hidden;
      padding: 5.5rem 0.75rem 6.5rem;
    }

    /* ── Scattered photo ──────────────────────────────────── */
    .pic {
      position: absolute;
      width: min(168px, calc(100vw - 3rem));
      border-radius: 1rem;
      overflow: visible;
      cursor: grab;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
      transition: box-shadow 0.3s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), z-index 0s;
      will-change: transform;
      user-select: none;
    }

    .pic img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
      border-radius: 1rem;
    }

    .pic:active {
      cursor: grabbing;
    }

    /* Pop-out + rotate on hover */
    .pic:not(.dragging):hover {
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.95);
      z-index: 200 !important;
      animation: popSpin 5s cubic-bezier(0.34, 1.56, 0.64, 1) both !important;
    }

    .pic-placeholder {
      width: 100%;
      aspect-ratio: 4 / 5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      color: #1a1a1a;
      border: 2px dashed #1a1a1a;
      border-radius: 1rem;
      animation: float 3s ease-in-out infinite;
    }

    /* ── Down arrow button ────────────────────────────────── */
    #down-btn {
      position: fixed;
      bottom: 1.15rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 998;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(8px);
      color: rgba(255, 255, 255, 0.5);
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s, transform 0.2s;
      animation: bounce 2s ease-in-out infinite;
    }

    #down-btn:hover {
      color: rgba(255, 255, 255, 0.9);
      border-color: rgba(255, 255, 255, 0.45);
      background: rgba(255, 255, 255, 0.12);
      animation: none;
      transform: translateX(-50%) scale(1.1);
    }

    /* ── Music button ─────────────────────────────────────── */
    #music-btn {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 999;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(8px);
      color: rgba(255, 255, 255, 0.5);
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s, transform 0.2s;
    }

    #music-btn:hover {
      color: rgba(255, 255, 255, 0.9);
      border-color: rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.12);
      transform: scale(1.1);
    }

    #music-btn.playing {
      color: #fff;
      border-color: rgba(255, 255, 255, 0.5);
    }

    #music-btn.playing .icon-note {
      animation: spin 2s linear infinite;
      display: inline-block;
    }

    /* ── Section 2: Spotify ───────────────────────────────────── */
    #section-spotify {
      width: 100vw;
      min-height: 100svh;
      height: 100svh;
      padding: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }

    .spotify-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      animation: fadeUp 0.7s ease both;
      width: min(100%, 340px);
    }

    .spotify-card iframe {
      width: min(100%, 320px);
      height: 380px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(30, 215, 96, 0.15);
    }

    .spotify-label {
      color: rgba(255, 255, 255, 0.2);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── Animations ───────────────────────────────────────── */
    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes dropIn {
      from {
        opacity: 0;
        transform: rotate(var(--r)) translateY(-60px) scale(0);
      }

      to {
        opacity: 1;
        transform: rotate(var(--r)) translateY(0) scale(0.05);
      }
    }

    @keyframes popSpin {
      0% {
        transform: rotate(var(--r)) scale(0.05);
      }

      100% {
        transform: rotate(calc(var(--r) + 1080deg)) scale(1.18);
      }
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateX(-50%) translateY(0);
      }

      50% {
        transform: translateX(-50%) translateY(6px);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Desktop overrides ────────────────────────────────── */
    @media (min-width: 701px) {
      #section-photos {
        padding: 0;
        min-height: 100vh;
        height: 100vh;
      }

      .pic {
        width: min(320px, calc(100vw - 2rem));
      }

      .pic-placeholder {
        aspect-ratio: 4 / 3;
        font-size: 5rem;
      }

      #down-btn {
        bottom: 2rem;
        width: 48px;
        height: 48px;
      }

      #music-btn {
        top: 1.5rem;
        right: 1.5rem;
      }

      #play-nudge {
        top: 1.5rem;
        right: 5rem;
        padding: 0.4rem 1rem;
      }

      #section-spotify {
        min-height: 100vh;
        height: 100vh;
        padding: 0;
      }

      .spotify-card {
        gap: 1.5rem;
        width: auto;
      }

      .spotify-card iframe {
        width: 340px;
        height: 460px;
      }
    }
  </style>
</head>

<body>

  <!-- ── Music ──────────────────────────────────────────────── -->
  <audio id="audio" src="olympan.mp3" loop preload="auto" autoplay></audio>
  <button id="music-btn" title="Toggle music"><span class="icon-note">🎵</span></button>

  <!-- ── Down arrow ─────────────────────────────────────────── -->
  <button id="down-btn" title="Scroll down">↓</button>

  <!-- ── Section 1: Photos ──────────────────────────────────── -->
  <section id="section-photos"></section>

  <!-- ── Section 2: Spotify ────────────────────────────────── -->
  <section id="section-spotify">
    <div class="spotify-card">
      <iframe src="https://open.spotify.com/embed/playlist/5mGzD29yy5kX3ekQ2tw6I2?utm_source=generator&theme=0"
        width="340" height="460" frameborder="0"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"
        title="Marwan's Spotify Playlist">
      </iframe>
      <span class="spotify-label">my playlist 🎧</span>
    </div>
  </section>

  <script>
    if ('scrollRestoration' in history) {
      history.scrollRestoration = 'manual';
    }

    window.addEventListener('load', () => {
      window.scrollTo(0, 0);
    });

    window.addEventListener('pageshow', () => {
      window.scrollTo(0, 0);
    });

    /* ── Music ──────────────────────────────────────────────── */
    const audio = document.getElementById('audio');
    const musicBtn = document.getElementById('music-btn');
    let playing = false;

    function setPlaying(val) {
      playing = val;
      musicBtn.classList.toggle('playing', val);
      musicBtn.querySelector('.icon-note').textContent = val ? '🔊' : '🎵';
    }

    // Try to play immediately; start on first interaction if browser blocks it
    audio.play().then(() => setPlaying(true)).catch(() => {});

    musicBtn.addEventListener('click', () => {
      if (playing) { audio.pause(); setPlaying(false); }
      else { audio.play().then(() => setPlaying(true)); }
    });

    // Unlock audio on first tap/click anywhere
    document.addEventListener('click', () => {
      if (!playing) audio.play().then(() => setPlaying(true)).catch(() => {});
    }, { once: true });

    /* ── Down button — cycles through sections ── */
    const sections = ['section-photos', 'section-spotify'];
    let currentSection = 0;
    const downBtn = document.getElementById('down-btn');

    function updateBtn() {
      const isLast = currentSection === sections.length - 1;
      downBtn.textContent = isLast ? '↑' : '↓';
      downBtn.title = isLast ? 'Back to top' : 'Scroll down';
    }

    downBtn.addEventListener('click', () => {
      if (currentSection === sections.length - 1) {
        currentSection = 0;
      } else {
        currentSection++;
      }
      document.getElementById(sections[currentSection]).scrollIntoView({ behavior: 'smooth' });
      updateBtn();
    });

    /* ── Photos ─────────────────────────────────────────────── */
    const PHOTOS = [
      { src: './me.jpg', emoji: '😎' },
    ];

    function buildSourceCandidates(src) {
      const normalized = src.startsWith('./') ? src : `./${src}`;
      const match = normalized.match(/^(.*)\.(jpe?g|png|webp|gif)$/i);
      if (!match) return [normalized];
      const [, base] = match;
      return [
        normalized,
        `${base}.jpeg`,
        `${base}.jpg`,
        `${base}.png`,
        `${base}.webp`,
        `${base}.gif`,
      ].filter((c, i, a) => a.indexOf(c) === i);
    }

    function loadPhotoWithFallback(img, sources, onFail) {
      let index = 0;
      function tryNext() {
        if (index >= sources.length) { onFail(); return; }
        img.src = sources[index++];
      }
      img.onerror = tryNext;
      img.onload = () => { img.onerror = null; };
      tryNext();
    }

    function rand(min, max) { return min + Math.random() * (max - min); }
    function clamp(value, min, max) { return Math.min(Math.max(value, min), max); }

    function getCardMetrics() {
      const mobile = window.innerWidth <= 700;
      const width = Math.min(mobile ? 168 : 320, window.innerWidth - (mobile ? 48 : 32));
      const height = width * (mobile ? 1.25 : 0.75);
      return { width, height, mobile };
    }

    function placeCards() {
      const W = window.innerWidth;
      const H = window.innerHeight;
      const { width, height, mobile } = getCardMetrics();
      const horizontalMargin = mobile ? 28 : 60;
      const verticalMargin = mobile ? 92 : 60;
      const bottomPadding = mobile ? 120 : 140;
      const photoCount = PHOTOS.length;

      if (photoCount === 1) {
        const centeredX = Math.max(horizontalMargin, (W - width) / 2);
        const availableTop = verticalMargin;
        const availableBottom = H - bottomPadding;
        const centeredY = clamp(
          ((availableTop + availableBottom - height) / 2) - 42,
          availableTop,
          availableBottom - height
        );
        return [{ x: centeredX, y: centeredY }];
      }

      if (mobile) {
        const stackedGap = 22;
        const centeredX = Math.max(horizontalMargin, (W - width) / 2);
        const availableTop = verticalMargin;
        const availableBottom = H - bottomPadding;
        const totalHeight = (photoCount * height) + ((photoCount - 1) * stackedGap);
        const startY = clamp(
          (availableTop + availableBottom - totalHeight) / 2,
          availableTop,
          Math.max(availableTop, availableBottom - totalHeight)
        );
        return PHOTOS.map((_, i) => ({ x: centeredX, y: startY + (i * (height + stackedGap)) }));
      }

      const mid = W / 2;
      const leftMin = horizontalMargin;
      const leftMax = Math.max(leftMin, mid - width - 40);
      const rightMin = Math.min(Math.max(horizontalMargin, mid + 40), Math.max(horizontalMargin, W - width - horizontalMargin));
      const rightMax = Math.max(rightMin, W - width - horizontalMargin);
      const topMin = verticalMargin;
      const topMax = Math.max(topMin, H - height - bottomPadding);

      return [
        { x: rand(leftMin, leftMax), y: rand(topMin, topMax) },
        { x: rand(rightMin, rightMax), y: rand(topMin, topMax) }
      ];
    }

    /* ── Drag (mouse + touch) ───────────────────────────────── */
    let dragEl = null, dragOffX = 0, dragOffY = 0, zTop = 10;
    const cards = [];

    document.addEventListener('mousemove', e => {
      if (!dragEl) return;
      dragEl.style.left = e.clientX - dragOffX + 'px';
      dragEl.style.top = e.clientY - dragOffY + 'px';
    });
    document.addEventListener('mouseup', () => {
      if (!dragEl) return;
      dragEl.classList.remove('dragging');
      dragEl.style.boxShadow = '0 20px 60px rgba(0,0,0,0.7)';
      dragEl = null;
    });

    document.addEventListener('touchmove', e => {
      if (!dragEl) return;
      e.preventDefault();
      const t = e.touches[0];
      dragEl.style.left = t.clientX - dragOffX + 'px';
      dragEl.style.top = t.clientY - dragOffY + 'px';
    }, { passive: false });
    document.addEventListener('touchend', () => {
      if (!dragEl) return;
      dragEl.classList.remove('dragging');
      dragEl.style.boxShadow = '0 20px 60px rgba(0,0,0,0.7)';
      dragEl = null;
    });

    function layoutCards() {
      const positions = placeCards();
      cards.forEach((card, i) => {
        const rot = Number(card.dataset.rotation || 0);
        const pos = positions[i];
        card.style.left = pos.x + 'px';
        card.style.top = pos.y + 'px';
        card.style.transform = `rotate(${rot}deg)`;
      });
    }

    /* ── Render ─────────────────────────────────────────────── */
    const section = document.getElementById('section-photos');
    const positions = placeCards();

    PHOTOS.forEach((photo, i) => {
      const rot = window.innerWidth <= 700 ? rand(-4, 4) : rand(-10, 10);
      const pos = positions[i];

      const card = document.createElement('div');
      card.className = 'pic';
      card.style.setProperty('--r', rot + 'deg');
      card.dataset.rotation = rot;
      card.style.left = pos.x + 'px';
      card.style.top = pos.y + 'px';
      card.style.transform = `rotate(${rot}deg)`;
      card.style.zIndex = i + 1;
      card.style.animation = `dropIn 0.5s ${i * 0.12}s cubic-bezier(0.175,0.885,0.32,1.275) both, popSpin 5s ${0.5 + i * 0.12}s cubic-bezier(0.34, 1.56, 0.64, 1) both`;

      const img = document.createElement('img');
      img.alt = '';
      img.draggable = false;
      loadPhotoWithFallback(img, buildSourceCandidates(photo.src), () => {
        card.innerHTML = '';
        const ph = document.createElement('div');
        ph.className = 'pic-placeholder';
        ph.textContent = photo.emoji;
        card.appendChild(ph);
      });
      card.appendChild(img);

      // Mouse drag
      card.addEventListener('mousedown', e => {
        e.preventDefault();
        dragEl = card;
        card.classList.add('dragging');
        const rect = card.getBoundingClientRect();
        dragOffX = e.clientX - rect.left;
        dragOffY = e.clientY - rect.top;
        zTop++;
        card.style.zIndex = zTop;
        card.style.boxShadow = '0 40px 100px rgba(0,0,0,0.95)';
      });

      // Touch drag
      card.addEventListener('touchstart', e => {
        e.preventDefault();
        dragEl = card;
        card.classList.add('dragging');
        const rect = card.getBoundingClientRect();
        dragOffX = e.touches[0].clientX - rect.left;
        dragOffY = e.touches[0].clientY - rect.top;
        zTop++;
        card.style.zIndex = zTop;
        card.style.boxShadow = '0 40px 100px rgba(0,0,0,0.95)';
      }, { passive: false });

      section.appendChild(card);
      cards.push(card);
    });

    window.addEventListener('resize', layoutCards);
  </script>
</body>

</html>
